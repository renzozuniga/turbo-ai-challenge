services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-turbo_ai_challenge}
      POSTGRES_USER: ${POSTGRES_USER:-turbo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-turbo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-turbo}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps/backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./apps/backend/.env
    environment:
      # Next's rewrite proxy forwards Host: backend:8000 when it proxies
      # server-side from the frontend container, so Django must allow it.
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
    restart: unless-stopped
    command: pnpm dev
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - ./apps/frontend/.env
    environment:
      # Overrides apps/frontend/.env's API_URL for this container: the rewrite
      # proxy runs server-side inside this container, so it must reach the
      # backend via the Docker service name, not "localhost".
      API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
