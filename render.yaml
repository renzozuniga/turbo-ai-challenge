services:
  - type: web
    name: turbo-ai-challenge-backend
    runtime: python
    plan: free
    rootDir: apps/backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: turbo-ai-challenge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://CHANGE-ME.vercel.app"
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: turbo-ai-challenge-db
    plan: free
